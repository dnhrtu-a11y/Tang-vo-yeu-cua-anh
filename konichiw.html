<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Bé Yêu</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#0a0005;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* HIỆU ỨNG HẠT BAY */
.particle{
  position:absolute;
  width:3px;height:3px;
  background:#ff6b8a;
  border-radius:50%;
  animation: float 10s linear infinite;
  pointer-events: none;
}
@keyframes float{
  from{transform:translateY(100vh);opacity:0;}
  10%{opacity:1;}
  to{transform:translateY(-10vh);opacity:0;}
}

/* TRÁI TIM */
.heart{
  font-size:110px;
  transition: transform 0.08s linear;
  filter: drop-shadow(0 0 25px rgba(255,50,80,0.9));
  z-index: 10;
  cursor: pointer;
}

/* QUẦNG SÁNG */
.glow{
  position:absolute;
  width:160px;height:160px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(255,50,80,0.3), transparent);
  z-index: 5;
  transition: transform 0.1s, opacity 0.1s;
}

/* PHẦN CHỮ */
.text{
  text-align:center;
  margin-top:20px;
  padding: 0 20px;
  z-index: 10;
}

.line{
  opacity:0;
  transform:translateY(20px);
  transition: all 0.8s ease;
}

.show{
  opacity:1;
  transform:translateY(0);
}

.line1{color:#ff6b8a;font-size:24px;font-weight:bold;margin-bottom:10px;}
.line2{color:#ffd6e0;font-size:16px;line-height:1.6;margin-bottom:15px;}
.line3{color:#ffaabb;font-size:19px;font-style:italic;}

/* NÚT BẤM */
#startBtn{
  position:fixed;
  bottom:30px;
  background:#ff6b8a;
  color:white;
  border:none;
  padding:12px 25px;
  border-radius:30px;
  cursor:pointer;
  font-weight: bold;
  box-shadow: 0 0 20px rgba(255,107,138,0.4);
  z-index: 100;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="particles-container"></div>
<div class="glow" id="glow"></div>
<div class="heart" id="heart">❤️</div>

<div class="text">
  <div class="line line1" id="l1"></div>
  <div class="line line2" id="l2"></div>
  <div class="line line3" id="l3"></div>
</div>

<audio id="music" loop crossorigin="anonymous">
  <source src="nhac.mp3" type="audio/mpeg">
</audio>

<button id="startBtn" onclick="startAll()">Bấm vào đây nè công chúa 💖</button>

<script>
// 1. TẠO HẠT BAY
const container = document.getElementById("particles-container");
for(let i=0; i<40; i++){
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "%";
  p.style.animationDuration = (Math.random() * 5 + 7) + "s";
  p.style.animationDelay = (Math.random() * 5) + "s";
  container.appendChild(p);
}

// 2. NỘI DUNG NGỌT NGÀO
const t1 = "Gửi người con gái anh yêu nhất...";
const t2 = "Cảm ơn em vì đã xuất hiện và làm thế giới của anh trở nên rực rỡ hơn.\nDù có chuyện gì xảy ra, hãy nhớ rằng luôn có anh ở đây và bên cạnh em những lúc em cần nhất,\nsẵn sàng ôm em vào lòng và cùng em vượt qua tất cả mọi thứ.";
const t3 = "Mãi bên cạnh anh nhé, anh yêu em rất nhiều! ❤️";

function type(el, text, speed, cb){
  let i = 0;
  el.innerHTML = "";
  function run(){
    if(i < text.length){
      if(text[i] == "\n") el.innerHTML += "<br>";
      else el.innerHTML += text[i];
      i++;
      setTimeout(run, speed);
    } else if(cb) cb();
  }
  run();
}

// 3. NHẠC VÀ HIỆU ỨNG ĐẬP
let audio = document.getElementById("music");
let ctx, analyser, dataArray;
let started = false;

function startAll(){
  if(started) return;
  started = true;

  document.getElementById("startBtn").style.display = "none";

  ctx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = ctx.createAnalyser();
  let src = ctx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(ctx.destination);
  analyser.fftSize = 64;
  dataArray = new Uint8Array(analyser.frequencyBinCount);

  audio.play();

  const el1 = document.getElementById("l1");
  const el2 = document.getElementById("l2");
  const el3 = document.getElementById("l3");

  el1.classList.add("show");
  type(el1, t1, 70, () => {
    setTimeout(() => {
      el2.classList.add("show");
      type(el2, t2, 45, () => {
        setTimeout(() => {
          el3.classList.add("show");
          type(el3, t3, 80);
        }, 500);
      });
    }, 500);
  });

  animate();
}

function animate(){
  requestAnimationFrame(animate);
  if(!analyser) return;

  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
  let avg = sum / dataArray.length;

  let scale = 1 + (avg / 255) * 0.75; // Độ nhạy của tim
  document.getElementById("heart").style.transform = "scale(" + scale + ")";

  let glow = document.getElementById("glow");
  glow.style.transform = "scale(" + (scale * 1.5) + ")";
  glow.style.opacity = avg / 180; 
}

// 4. TẮT NHẠC KHI THOÁT APP
document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    audio.pause();
    if(ctx) ctx.suspend();
  } else {
    if (started) {
      audio.play();
      if(ctx) ctx.resume();
    }
  }
});
</script>

</body>
</html>
